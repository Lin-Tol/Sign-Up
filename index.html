<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Sign up Page</title>
	<link rel='stylesheet' href='style.css'>
</head>
<body>
	<img class='bgImage'src="designproj.jpg">
	<div class="container">
		<div class='imgSide'>
			<div><p><img class='odinLogo'>Odin</p></div>
		</div>
		<div class='textSide'>
			<div class='signUp'>
				<div class='top'><p>Not a Real Service bro!</p></div>
				<div class='sign'>
					<form>
						<fieldset class='leftSection'>
							<label for='firstName'>FIRST NAME</label>
							<input id='firstName' type='text' name='fname'>
							<label for='email'>EMAIL</label>
							<input type='email' name='email' id='email'>
							<label for='pword'>PASSWORD</label>
							<input type='password' name='password' id='pword'>
						</fieldset>
						<fieldset class='rightSection'>
							<label for='lastName'>LAST NAME</label>
							<input type='text' name='lname'>
							<label for='number'>PHONE NUMBER</label>
							<input type='number' name='number' id='number'>
							<label for='pwordConfirm'>CONFIRM PASSWORD</label>
							<input type='password' name='pwordConfirm' id='pwordConfirm'>
						</fieldset>
						<fieldset class='under'>
							<button class='submit'>Create Account</button>
							<p>Already have an account? <span class='logIn'>Log in</span></p>
						</fieldset>
					</form>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
